name: Keep Supabase Alive

# 每 3 天對 Supabase 打一個極輕量的請求，避免免費專案因閒置被自動暫停。
# anon key 已公開於 js/supabase.js，因此直接寫在這裡即可，不需額外 secret。

on:
  schedule:
    # 每月 1, 4, 7, ... 日的 06:00 UTC（台灣 14:00）執行，間隔皆 <7 天
    - cron: '0 6 */3 * *'
  workflow_dispatch:  # 也可到 Actions 分頁手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          URL="https://wzavnkmgncswwxtnjubn.supabase.co/rest/v1/settings?select=id&limit=1"
          KEY="sb_publishable_nGO1uuvinvmdv1aO8OwW3Q_SD-8ddcq"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            "$URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::Supabase ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is awake ✅"
